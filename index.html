<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{--brand:#b58b63;--brand-dark:#a1764f;--bg:#f5f2ee;--white:#fff;--gray:#f1ede8;--text:#1a1a1a;--muted:#777;--border:#e0d8d0;--danger:#e53935;--success:#25D366}
body{background:var(--bg);color:var(--text);min-height:100vh}
.editor-layout{display:grid;grid-template-columns:390px 1fr;min-height:100vh}
.panel-left{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
.panel-right{background:var(--bg);padding:20px;display:flex;flex-direction:column;align-items:center}
.panel-header{padding:14px 20px;border-bottom:1px solid var(--border)}
.panel-header h1{font-size:17px;font-weight:600;margin-bottom:1px}
.panel-header p{font-size:11px;color:var(--muted)}
.panel-tabs{display:flex;border-bottom:1px solid var(--border)}
.ptab{flex:1;padding:10px 4px;border:none;background:transparent;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.ptab.active{color:var(--brand);border-bottom-color:var(--brand)}
.panel-body{flex:1;overflow-y:auto;padding:14px 18px}
.tab-content{display:none}
.tab-content.active{display:block}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:9px;font-size:13px;color:var(--text);background:var(--gray);outline:none;transition:border .2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--brand);background:var(--white)}
.form-group textarea{resize:vertical;min-height:56px}
.color-row{display:flex;align-items:center;gap:8px}
.color-row input[type="color"]{width:40px;height:34px;border-radius:8px;border:1px solid var(--border);cursor:pointer;padding:2px}
.section-card{background:var(--gray);border-radius:14px;padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.section-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-card-header h3{font-size:13px;font-weight:600}
.btn-icon{width:26px;height:26px;border-radius:7px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);transition:all .2s}
.btn-icon:hover{background:var(--border)}
.btn-icon.danger:hover{background:#fdecea;color:var(--danger)}
.product-card{background:var(--white);border-radius:12px;padding:11px;margin-bottom:9px;border:1px solid var(--border)}
.product-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.product-card .form-group{margin-bottom:7px}
.product-card .form-group label{font-size:10px}
.product-card .form-group input{font-size:12px;padding:7px 10px}
.product-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.add-product-btn{width:100%;padding:8px;border:2px dashed var(--border);border-radius:9px;background:transparent;color:var(--brand);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.add-product-btn:hover{border-color:var(--brand);background:#fdf7f2}
.btn{padding:9px 16px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--brand);color:var(--white)}
.btn-primary:hover{background:var(--brand-dark)}
.btn-add-section{width:100%;padding:9px;border:2px dashed var(--brand);border-radius:11px;background:transparent;color:var(--brand);font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .2s}
.btn-add-section:hover{background:#fdf7f2}
.download-bar{padding:12px 18px;border-top:1px solid var(--border);background:var(--white);display:flex;flex-direction:column;gap:7px}
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;width:380px}
.preview-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.phone-frame{background:#1a1a1a;border-radius:44px;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.35);width:380px}
.phone-screen{border-radius:36px;overflow:hidden;height:720px;background:#f9f7f4}
.phone-screen iframe{width:100%;height:100%;border:none;display:block}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.badge-success{background:#e8f8f0;color:#1a7a40}
.badge-warn{background:#fff3e0;color:#e65100}

/* IMAGE UPLOAD COMPONENT */
.img-upload-wrap{position:relative}
.img-upload-box{border:2px dashed var(--border);border-radius:10px;padding:0;cursor:pointer;transition:all .2s;background:var(--gray);overflow:hidden;position:relative}
.img-upload-box:hover{border-color:var(--brand)}
.img-upload-box input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;width:100%;height:100%}
.img-upload-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 10px;gap:4px;pointer-events:none}
.img-upload-placeholder span.icon{font-size:22px}
.img-upload-placeholder span.label{font-size:11px;color:var(--muted);text-align:center}
.img-upload-preview{width:100%;height:90px;object-fit:cover;display:block;border-radius:8px}
.img-upload-clear{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:white;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
.img-upload-loading{position:absolute;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);border-radius:8px;z-index:4}

/* Thumb en header */
.thumb-img{width:46px;height:46px;border-radius:10px;object-fit:cover;flex-shrink:0}
.thumb-placeholder{width:46px;height:46px;border-radius:10px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
</style>
</head>
<body>

<div class="editor-layout">
  <div class="panel-left">
    <div class="panel-header">
      <h1>🍽️ Editor de Menú Digital</h1>
      <p>Personaliza y descarga tu menú listo para subir</p>
    </div>
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchTab('general',this)">General</button>
      <button class="ptab" onclick="switchTab('secciones',this)">Secciones</button>
      <button class="ptab" onclick="switchTab('whatsapp',this)">WhatsApp</button>
      <button class="ptab" onclick="switchTab('estilo',this)">Estilo</button>
    </div>
    <div class="panel-body">

      <div class="tab-content active" id="tab-general">
        <div class="form-group">
          <label>Nombre del restaurante</label>
          <input type="text" id="restaurantName" value="Menu AbnerDev" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>Emoji / ícono</label>
          <input type="text" id="restaurantEmoji" value="🍽️" oninput="updatePreview()" maxlength="4">
        </div>
        <div class="form-group">
          <label>Mensaje de bienvenida (opcional)</label>
          <textarea id="welcomeMsg" rows="2" placeholder="Ej: Bienvenidos a nuestro restaurante..." oninput="updatePreview()"></textarea>
        </div>
        <div class="form-group">
          <label>Moneda</label>
          <select id="currency" onchange="updatePreview()">
            <option value="MXN">🇲🇽 MXN</option>
            <option value="USD">🇺🇸 USD</option>
            <option value="COP">🇨🇴 COP</option>
            <option value="GTQ">🇬🇹 GTQ</option>
            <option value="PEN">🇵🇪 PEN</option>
            <option value="CLP">🇨🇱 CLP</option>
            <option value="ARS">🇦🇷 ARS</option>
          </select>
        </div>
      </div>

      <div class="tab-content" id="tab-secciones">
        <div id="sections-editor"></div>
        <button class="btn-add-section" onclick="addSection()">+ Agregar sección</button>
      </div>

      <div class="tab-content" id="tab-whatsapp">
        <div class="form-group">
          <label>Número de WhatsApp</label>
          <input type="text" id="waPhone" value="529811064643" oninput="updatePreview()">
          <p style="font-size:10px;color:var(--muted);margin-top:3px">Con código de país, sin + (Ej: 52 para México)</p>
        </div>
        <div class="form-group">
          <label>Texto del botón de envío</label>
          <input type="text" id="waBtnText" value="Enviar pedido por WhatsApp" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>Prefijo del mensaje</label>
          <textarea id="waPrefix" rows="2" oninput="updatePreview()">Hola, quiero hacer el siguiente pedido:</textarea>
        </div>
        <div class="form-group">
          <label>Mensaje después de enviar</label>
          <input type="text" id="waSuccess" value="✅ Pedido enviado correctamente" oninput="updatePreview()">
        </div>
      </div>

      <div class="tab-content" id="tab-estilo">
        <div class="form-group">
          <label>Color principal</label>
          <div class="color-row">
            <input type="color" id="colorPrimary" value="#b58b63" oninput="updatePreview()">
            <span id="colorPrimaryVal" style="font-size:12px;color:var(--muted)">#b58b63</span>
          </div>
        </div>
        <div class="form-group">
          <label>Fondo de la app</label>
          <div class="color-row">
            <input type="color" id="colorBg" value="#f9f7f4" oninput="updatePreview()">
            <span id="colorBgVal" style="font-size:12px;color:var(--muted)">#f9f7f4</span>
          </div>
        </div>
        <div class="form-group">
          <label>Fondo exterior</label>
          <div class="color-row">
            <input type="color" id="colorOuter" value="#e9e4de" oninput="updatePreview()">
            <span id="colorOuterVal" style="font-size:12px;color:var(--muted)">#e9e4de</span>
          </div>
        </div>
        <div class="form-group">
          <label>Fuente</label>
          <select id="fontFamily" onchange="updatePreview()">
            <option value="Poppins">Poppins (original)</option>
            <option value="Nunito">Nunito</option>
            <option value="Raleway">Raleway</option>
            <option value="Montserrat">Montserrat</option>
            <option value="Lato">Lato</option>
            <option value="Inter">Inter</option>
          </select>
        </div>
        <div class="form-group">
          <label>Radio de bordes</label>
          <select id="borderRadius" onchange="updatePreview()">
            <option value="22px">Muy redondeado (original)</option>
            <option value="16px">Redondeado</option>
            <option value="8px">Semi-cuadrado</option>
            <option value="4px">Cuadrado</option>
          </select>
        </div>
      </div>
    </div>

    <div class="download-bar">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:11px;color:var(--muted)"><span id="productCount">12</span> productos · <span id="sectionCount">3</span> secciones</span>
        <span class="badge badge-success">Vista previa activa</span>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:14px" onclick="downloadHTML()">
        ⬇️ Descargar HTML listo
      </button>
    </div>
  </div>

  <div class="panel-right">
    <div class="preview-header">
      <span class="preview-label">Vista previa en tiempo real</span>
      <span class="badge badge-warn">📱 Mobile</span>
    </div>
    <div class="phone-frame">
      <div class="phone-screen">
        <iframe id="previewFrame" srcdoc=""></iframe>
      </div>
    </div>
  </div>
</div>

<script>
let menuData = {
  name:"Menu AbnerDev", emoji:"🍽️", welcome:"", currency:"MXN",
  waPhone:"529811064643", waBtnText:"Enviar pedido por WhatsApp",
  waPrefix:"Hola, quiero hacer el siguiente pedido:", waSuccess:"✅ Pedido enviado correctamente",
  colorPrimary:"#b58b63", colorBg:"#f9f7f4", colorOuter:"#e9e4de",
  fontFamily:"Poppins", borderRadius:"22px",
  sections:[
    {id:"breakfast",name:"Breakfast",products:[
      {id:"p1",name:"Pancakes Clasicos",price:"24",description:"Waffle artesanal con fresas, frutos rojos y helado.",image:""},
      {id:"p2",name:"Pancakes Choco",price:"24",description:"Pancakes con cobertura de chocolate.",image:""},
      {id:"p3",name:"Pancakes Platano",price:"24",description:"Pancakes con rodajas de plátano caramelizado.",image:""},
      {id:"p4",name:"Pancakes Avena",price:"24",description:"Pancakes saludables de avena con miel.",image:""}
    ]},
    {id:"malteadas",name:"Malteadas",products:[
      {id:"p5",name:"Malteada Choco",price:"24",description:"Malteada cremosa de chocolate.",image:""},
      {id:"p6",name:"Malteada Fresa",price:"24",description:"Malteada de fresas frescas.",image:""},
      {id:"p7",name:"Malteada Vainilla",price:"24",description:"Clásica malteada de vainilla.",image:""},
      {id:"p8",name:"Malteada Oreo",price:"24",description:"Malteada con galletas Oreo.",image:""}
    ]},
    {id:"helados",name:"Helados",products:[
      {id:"p9",name:"Helado Vainilla",price:"24",description:"Helado suave de vainilla.",image:""},
      {id:"p10",name:"Helado Chocolate",price:"24",description:"Helado intenso de chocolate.",image:""},
      {id:"p11",name:"Helado Fresa",price:"24",description:"Helado natural de fresa.",image:""},
      {id:"p12",name:"Helado Platano",price:"24",description:"Helado cremoso de plátano.",image:""}
    ]}
  ]
};

function switchTab(tab, btn) {
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

function collectData() {
  menuData.name = document.getElementById('restaurantName').value;
  menuData.emoji = document.getElementById('restaurantEmoji').value;
  menuData.welcome = document.getElementById('welcomeMsg').value;
  menuData.currency = document.getElementById('currency').value;
  menuData.waPhone = document.getElementById('waPhone').value;
  menuData.waBtnText = document.getElementById('waBtnText').value;
  menuData.waPrefix = document.getElementById('waPrefix').value;
  menuData.waSuccess = document.getElementById('waSuccess').value;
  menuData.colorPrimary = document.getElementById('colorPrimary').value;
  menuData.colorBg = document.getElementById('colorBg').value;
  menuData.colorOuter = document.getElementById('colorOuter').value;
  menuData.fontFamily = document.getElementById('fontFamily').value;
  menuData.borderRadius = document.getElementById('borderRadius').value;
  document.getElementById('colorPrimaryVal').textContent = menuData.colorPrimary;
  document.getElementById('colorBgVal').textContent = menuData.colorBg;
  document.getElementById('colorOuterVal').textContent = menuData.colorOuter;
}

// ── IMAGE UPLOAD → base64 ──
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function createImageUpload(si, pi) {
  const p = menuData.sections[si].products[pi];
  const uid = `img-${si}-${pi}`;

  const wrap = document.createElement('div');
  wrap.className = 'form-group';
  wrap.innerHTML = `<label>Imagen del producto</label>`;

  const box = document.createElement('div');
  box.className = 'img-upload-box';
  box.style.minHeight = '90px';
  box.id = `box-${uid}`;

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';

  const placeholder = document.createElement('div');
  placeholder.className = 'img-upload-placeholder';
  placeholder.innerHTML = `<span class="icon">📷</span><span class="label">Clic o arrastra una imagen<br><span style="color:var(--brand);font-weight:600">Subir imagen</span></span>`;

  box.appendChild(input);
  box.appendChild(placeholder);

  // Si ya hay imagen, mostrarla
  if (p.image) {
    renderImagePreview(box, p.image, si, pi, uid);
  }

  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Validar tamaño (max 3MB)
    if (file.size > 3 * 1024 * 1024) {
      alert('La imagen es muy grande. Máximo 3MB.');
      return;
    }

    // Loading
    const loading = document.createElement('div');
    loading.className = 'img-upload-loading';
    loading.textContent = 'Procesando...';
    box.appendChild(loading);

    try {
      const base64 = await fileToBase64(file);
      menuData.sections[si].products[pi].image = base64;
      loading.remove();
      renderImagePreview(box, base64, si, pi, uid);
      updatePreview();
      // Actualizar thumb en header
      updateThumb(si, pi, base64);
    } catch(err) {
      loading.remove();
      alert('Error al procesar la imagen.');
    }
  });

  // Drag & drop
  box.addEventListener('dragover', e => { e.preventDefault(); box.style.borderColor = 'var(--brand)'; box.style.background = '#fdf7f2'; });
  box.addEventListener('dragleave', () => { box.style.borderColor = ''; box.style.background = ''; });
  box.addEventListener('drop', async e => {
    e.preventDefault();
    box.style.borderColor = ''; box.style.background = '';
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    if (file.size > 3 * 1024 * 1024) { alert('Imagen muy grande. Máximo 3MB.'); return; }
    const loading = document.createElement('div');
    loading.className = 'img-upload-loading';
    loading.textContent = 'Procesando...';
    box.appendChild(loading);
    try {
      const base64 = await fileToBase64(file);
      menuData.sections[si].products[pi].image = base64;
      loading.remove();
      renderImagePreview(box, base64, si, pi, uid);
      updatePreview();
      updateThumb(si, pi, base64);
    } catch(err) { loading.remove(); }
  });

  wrap.appendChild(box);
  return wrap;
}

function renderImagePreview(box, src, si, pi, uid) {
  box.innerHTML = '';
  const img = document.createElement('img');
  img.className = 'img-upload-preview';
  img.src = src;

  const clearBtn = document.createElement('button');
  clearBtn.className = 'img-upload-clear';
  clearBtn.textContent = '✕';
  clearBtn.title = 'Quitar imagen';
  clearBtn.onclick = (e) => {
    e.stopPropagation();
    menuData.sections[si].products[pi].image = '';
    updateThumb(si, pi, '');
    updatePreview();
    // Re-render solo este uploader
    const parent = box.parentElement;
    const newUpload = createImageUpload(si, pi);
    parent.replaceChild(newUpload.querySelector('.img-upload-box') || newUpload, box);
    // Easier: re-render sections
    renderSectionsEditor();
  };

  // Nuevo input file para reemplazar
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.style.cssText = 'position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;width:100%;height:100%';
  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { alert('Imagen muy grande. Máximo 3MB.'); return; }
    const loading = document.createElement('div');
    loading.className = 'img-upload-loading';
    loading.textContent = 'Procesando...';
    box.appendChild(loading);
    try {
      const base64 = await fileToBase64(file);
      menuData.sections[si].products[pi].image = base64;
      loading.remove();
      renderImagePreview(box, base64, si, pi, uid);
      updatePreview();
      updateThumb(si, pi, base64);
    } catch(err) { loading.remove(); }
  });

  box.style.minHeight = '90px';
  box.appendChild(img);
  box.appendChild(clearBtn);
  box.appendChild(input);
}

function updateThumb(si, pi, src) {
  const thumb = document.getElementById(`thumb-${si}-${pi}`);
  if (!thumb) return;
  if (src) {
    thumb.innerHTML = `<img src="${src}" style="width:46px;height:46px;border-radius:10px;object-fit:cover">`;
  } else {
    thumb.innerHTML = '🖼️';
  }
}

function renderSectionsEditor() {
  const container = document.getElementById('sections-editor');
  container.innerHTML = '';
  let total = 0;
  menuData.sections.forEach((section, si) => {
    total += section.products.length;
    const card = document.createElement('div');
    card.className = 'section-card';

    const header = document.createElement('div');
    header.className = 'section-card-header';
    header.innerHTML = `
      <h3>📂 ${section.name}</h3>
      <div style="display:flex;gap:3px">
        <button class="btn-icon" onclick="moveSectionUp(${si})" title="Subir">↑</button>
        <button class="btn-icon" onclick="moveSectionDown(${si})" title="Bajar">↓</button>
        <button class="btn-icon danger" onclick="removeSection(${si})" title="Eliminar">🗑</button>
      </div>`;
    card.appendChild(header);

    const nameGroup = document.createElement('div');
    nameGroup.className = 'form-group';
    nameGroup.innerHTML = `<label>Nombre de la sección</label><input value="${section.name}" oninput="menuData.sections[${si}].name=this.value;updatePreview()">`;
    card.appendChild(nameGroup);

    section.products.forEach((p, pi) => {
      const pc = document.createElement('div');
      pc.className = 'product-card';

      // Header with thumb
      const pHeader = document.createElement('div');
      pHeader.className = 'product-card-header';
      const thumb = document.createElement('div');
      thumb.className = 'thumb-placeholder';
      thumb.id = `thumb-${si}-${pi}`;
      thumb.innerHTML = p.image ? `<img src="${p.image}" style="width:46px;height:46px;border-radius:10px;object-fit:cover">` : '🖼️';
      const pInfo = document.createElement('div');
      pInfo.style.cssText = 'flex:1;min-width:0';
      pInfo.innerHTML = `<div style="font-size:12px;font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--muted)">${menuData.currency} ${p.price}</div>`;
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-icon danger';
      delBtn.textContent = '🗑';
      delBtn.onclick = () => removeProduct(si, pi);
      pHeader.appendChild(thumb); pHeader.appendChild(pInfo); pHeader.appendChild(delBtn);
      pc.appendChild(pHeader);

      // Name + Price row
      const row = document.createElement('div');
      row.className = 'product-row';
      row.innerHTML = `
        <div class="form-group"><label>Nombre</label><input value="${p.name}" oninput="menuData.sections[${si}].products[${pi}].name=this.value;updatePreview();document.querySelector('#thumb-${si}-${pi} div,#thumb-${si}-${pi}').style&&(document.querySelector('#thumb-${si}-${pi}').querySelector('div')?.remove());"></div>
        <div class="form-group"><label>Precio</label><input type="number" value="${p.price}" oninput="menuData.sections[${si}].products[${pi}].price=this.value;updatePreview()"></div>`;
      pc.appendChild(row);

      // Description
      const descGroup = document.createElement('div');
      descGroup.className = 'form-group';
      descGroup.innerHTML = `<label>Descripción</label><input value="${p.description}" oninput="menuData.sections[${si}].products[${pi}].description=this.value;updatePreview()">`;
      pc.appendChild(descGroup);

      // Image upload
      const imgUpload = createImageUpload(si, pi);
      pc.appendChild(imgUpload);

      card.appendChild(pc);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-product-btn';
    addBtn.textContent = '+ Agregar producto';
    addBtn.onclick = () => addProduct(si);
    card.appendChild(addBtn);

    container.appendChild(card);
  });

  document.getElementById('productCount').textContent = total;
  document.getElementById('sectionCount').textContent = menuData.sections.length;
}

function addSection() {
  menuData.sections.push({id:'sec_'+Date.now(),name:'Nueva Sección',products:[]});
  renderSectionsEditor(); updatePreview();
}
function removeSection(si) {
  if(!confirm('¿Eliminar esta sección?')) return;
  menuData.sections.splice(si,1); renderSectionsEditor(); updatePreview();
}
function moveSectionUp(si) {
  if(si===0) return;
  [menuData.sections[si-1],menuData.sections[si]]=[menuData.sections[si],menuData.sections[si-1]];
  renderSectionsEditor(); updatePreview();
}
function moveSectionDown(si) {
  if(si>=menuData.sections.length-1) return;
  [menuData.sections[si+1],menuData.sections[si]]=[menuData.sections[si],menuData.sections[si+1]];
  renderSectionsEditor(); updatePreview();
}
function addProduct(si) {
  menuData.sections[si].products.push({id:'p'+Date.now(),name:'Nuevo Producto',price:'25',description:'Descripción del producto',image:''});
  renderSectionsEditor(); updatePreview();
}
function removeProduct(si,pi) {
  menuData.sections[si].products.splice(pi,1); renderSectionsEditor(); updatePreview();
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function darken(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[Math.max(0,r-20),Math.max(0,g-20),Math.max(0,b-20)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function generateHTML() {
  const d = menuData;
  const tabsHTML = d.sections.map(s=>`<button class="tab" data-target="${s.id}">${escH(s.name)}</button>`).join('\n        ');
  const sectionsHTML = d.sections.map(s=>{
    const items = s.products.map(p=>{
      const imgHTML = p.image
        ? `<img src="${p.image}" alt="${escH(p.name)}" style="width:75px;height:75px;object-fit:cover;border-radius:16px">`
        : `<div style="width:75px;height:75px;background:#e0d8d0;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px">🍽️</div>`;
      return `
      <div class="item" data-name="${escH(p.name)}" data-description="${escH(p.description)}" data-price="${p.price}" data-image="${p.image?'[IMG]':''}">
        <div class="item-image">${imgHTML}</div>
        <div style="flex:1;min-width:0">
          <h3 class="item-title">${escH(p.name)}</h3>
          <div class="price">$${p.price} ${d.currency}</div>
        </div>
        <button class="add-btn">+</button>
      </div>`;
    }).join('');
    return `\n    <section id="${s.id}" class="section">\n      <h2>${escH(s.name)}</h2>${items}\n    </section>`;
  }).join('\n');

  // Para el HTML final, las imágenes base64 se embeben directamente
  const finalHTML = generateFinalHTML(d, tabsHTML, sectionsHTML);
  return finalHTML;
}

function generateFinalHTML(d, tabsHTML, sectionsHTML) {
  // Reconstruir secciones con base64 real incrustado
  const realSectionsHTML = d.sections.map(s=>{
    const items = s.products.map(p=>{
      const imgSrc = p.image || '';
      const imgHTML = imgSrc
        ? `<img src="${imgSrc}" alt="${escH(p.name)}" style="width:75px;height:75px;object-fit:cover;border-radius:16px">`
        : `<div style="width:75px;height:75px;background:#e0d8d0;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px">🍽️</div>`;
      const modalImgAttr = imgSrc ? `data-image="HAS_IMG" data-imgsrc="${escH(imgSrc)}"` : 'data-image="" data-imgsrc=""';
      return `
      <div class="item" data-name="${escH(p.name)}" data-description="${escH(p.description)}" data-price="${p.price}" ${modalImgAttr}>
        <div class="item-image">${imgHTML}</div>
        <div style="flex:1;min-width:0">
          <h3 class="item-title">${escH(p.name)}</h3>
          <div class="price">$${p.price} ${d.currency}</div>
        </div>
        <button class="add-btn">+</button>
      </div>`;
    }).join('');
    return `\n    <section id="${s.id}" class="section">\n      <h2>${escH(s.name)}</h2>${items}\n    </section>`;
  }).join('\n');

  return `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>${escH(d.name)}</title>
  <link href="https://fonts.googleapis.com/css2?family=${d.fontFamily}:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'${d.fontFamily}',sans-serif}
    :root{--color:${d.colorPrimary};--color-dark:${darken(d.colorPrimary)};--bg:${d.colorBg};--outer:${d.colorOuter};--radius:${d.borderRadius}}
    body{background:var(--outer);margin:0}
    .app{width:100%;max-width:380px;background:var(--bg);border-radius:30px;padding:20px;min-height:100vh;box-shadow:0 20px 60px rgba(0,0,0,.12)}
    .top-bar{position:sticky;top:0;background:var(--bg);z-index:20;padding-bottom:12px}
    .header h1{font-size:20px;color:#000;font-weight:500;margin-bottom:14px}
    .tabs{display:flex;gap:10px;overflow-x:auto;white-space:nowrap;padding:6px;background:white;border-radius:999px;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex:0 0 auto;padding:12px 20px;border-radius:999px;border:none;background:transparent;font-weight:500;cursor:pointer;color:#000}
    .tab.active{background:var(--color);color:white}
    .section{padding-top:20px;margin-bottom:40px}
    h2{font-size:18px;margin-bottom:14px}
    .item{display:flex;align-items:center;gap:14px;background:white;border-radius:var(--radius);padding:12px;box-shadow:0 8px 20px rgba(0,0,0,.06);margin-bottom:16px;cursor:pointer}
    .item-title{font-size:15px;font-weight:600;margin-bottom:4px}
    .price{font-size:14px;font-weight:600}
    .add-btn{width:42px;height:42px;min-width:42px;border-radius:50%;border:none;background:var(--color);color:white;font-size:20px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s;z-index:90}
    .overlay.active{opacity:1;pointer-events:all}
    .product-modal{position:fixed;left:0;right:0;bottom:-100%;max-height:90vh;background:white;border-top-left-radius:24px;border-top-right-radius:24px;transition:.4s ease;z-index:100;display:flex}
    .product-modal.active{bottom:0}
    .modal-content{width:100%;padding:20px;display:flex;flex-direction:column;overflow-y:auto;max-height:90vh}
    .modal-content img{width:100%;height:220px;object-fit:cover;border-radius:16px;margin-bottom:15px}
    .modal-no-img{width:100%;height:160px;background:#f1ece6;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:15px}
    .modal-info h2{margin-bottom:6px}
    textarea{margin-top:15px;padding:12px;border-radius:12px;border:1px solid #ddd;resize:none;height:80px;font-family:inherit;width:100%}
    .modal-footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center}
    .quantity{display:flex;align-items:center;gap:10px}
    .quantity button{width:32px;height:32px;border-radius:50%;border:none;background:#eee;font-size:18px;cursor:pointer}
    .add-cart-btn{background:var(--color);color:white;border:none;padding:12px 18px;border-radius:999px;font-weight:600;cursor:pointer}
    .close-modal{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.9);font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .cart-bar{position:fixed;bottom:0;left:0;right:0;height:64px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 16px;box-shadow:0 -4px 12px rgba(0,0,0,.08);transform:translateY(100%);transition:.4s ease;z-index:200}
    .cart-bar.active{transform:translateY(0)}
    .cart-images{display:flex;gap:6px}
    .cart-images img{width:36px;height:36px;border-radius:8px;object-fit:cover}
    .cart-info{display:flex;flex-direction:column;font-size:13px}
    .go-cart{background:var(--color);color:white;border:none;padding:8px 14px;border-radius:999px;font-weight:600;cursor:pointer}
    .cart-sheet{position:fixed;left:0;right:0;bottom:0;height:100%;background:white;border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .4s ease;z-index:2000;display:flex;flex-direction:column}
    .cart-sheet.active{transform:translateY(0)}
    .cart-sheet-header{display:flex;justify-content:space-between;padding:20px;font-weight:bold;border-bottom:1px solid #eee}
    .cart-sheet-content{flex:1;overflow-y:auto;padding:15px}
    .cart-whatsapp{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px;border-top:1px solid #eee}
    #sendWhatsApp{padding:14px 18px;border:none;border-radius:14px;background:#25D366;color:white;font-weight:600;font-size:15px;cursor:pointer}
    .cart-total{font-size:16px;font-weight:600}
    .cart-item{position:relative;background:#fff;border-radius:12px;margin-bottom:12px;overflow:hidden}
    .cart-item-inner{display:flex;align-items:center;padding:12px;background:white;position:relative;z-index:2;transition:transform .3s}
    .cart-item.swiped .cart-item-inner{transform:translateX(-80px)}
    .delete-zone{position:absolute;right:0;top:0;height:100%;width:80px;background:#e53935;display:flex;justify-content:center;align-items:center;color:white;font-weight:bold;cursor:pointer}
    .cart-item img{width:55px;height:55px;border-radius:10px;object-fit:cover;margin-right:12px}
    .cart-thumb-placeholder{width:55px;height:55px;border-radius:10px;background:#f1ece6;display:flex;align-items:center;justify-content:center;font-size:22px;margin-right:12px;flex-shrink:0}
    .cart-controls{margin-left:auto;display:flex;align-items:center;gap:10px}
    .cart-controls button{border:none;background:#f2f2f2;padding:6px 10px;border-radius:8px;font-size:16px;cursor:pointer}
    #closeCart{width:36px;height:36px;border-radius:50%;border:none;background:#f1ece6;font-size:18px;cursor:pointer}
    .confirm-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;justify-content:center;align-items:flex-end;z-index:3000}
    .confirm-modal.active{display:flex}
    .confirm-content{background:white;width:100%;max-height:80%;border-radius:24px 24px 0 0;padding:20px;overflow-y:auto}
    .confirm-content h3{margin-bottom:15px}
    .confirm-item{display:flex;align-items:center;margin-bottom:12px}
    .confirm-item img{width:45px;height:45px;border-radius:8px;object-fit:cover;margin-right:10px}
    .confirm-item-thumb{width:45px;height:45px;border-radius:8px;background:#f1ece6;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px;flex-shrink:0}
    .confirm-total{font-weight:bold;margin:15px 0;font-size:16px}
    .confirm-buttons{display:flex;gap:10px}
    #cancelConfirm{flex:1;padding:12px;border:none;border-radius:12px;background:#eee;cursor:pointer}
    #confirmSend{flex:1;padding:12px;border:none;border-radius:12px;background:#25D366;color:white;font-weight:600;cursor:pointer}
    .cart-note{font-size:12px;color:#777;margin-top:4px}
    .success-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:white;padding:12px 20px;border-radius:999px;font-size:14px;opacity:0;transition:.3s;z-index:9999;white-space:nowrap}
    .success-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    ${d.welcome?'.welcome-msg{background:white;border-radius:16px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#555;border-left:3px solid var(--color)}':''}
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <header class="header"><h1>${escH(d.emoji)} ${escH(d.name)}</h1></header>
    <div class="tabs">${tabsHTML}</div>
  </div>
  ${d.welcome?`<div class="welcome-msg">${escH(d.welcome)}</div>`:''}
  ${realSectionsHTML}
</div>
<div class="overlay"></div>
<div class="product-modal">
  <div class="modal-content">
    <button class="close-modal">✕</button>
    <div id="modalImgWrap"></div>
    <div class="modal-info"><h2 id="modalName"></h2><p id="modalDescription"></p></div>
    <textarea id="modalNotes" placeholder="Instrucciones especiales..."></textarea>
    <div class="modal-footer">
      <div class="quantity"><button id="minus">-</button><span id="quantityValue">1</span><button id="plus">+</button></div>
      <button class="add-cart-btn">Agregar al carrito</button>
    </div>
  </div>
</div>
<div class="cart-bar">
  <div class="cart-images"></div>
  <div class="cart-info"><span id="cartCount">0 productos</span><span id="cartTotal">$0</span></div>
  <button id="goToCart" class="go-cart">Ver carrito</button>
</div>
<div class="cart-sheet" id="cartSheet">
  <div class="cart-sheet-header"><span>Tu carrito</span><button id="closeCart">✕</button></div>
  <div class="cart-sheet-content" id="cartSheetContent"></div>
  <div class="cart-whatsapp">
    <div class="cart-total">Total: <span id="sheetTotal">$0</span></div>
    <button id="sendWhatsApp">${escH(d.waBtnText)}</button>
  </div>
</div>
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-content">
    <h3>Confirmar pedido</h3>
    <div id="confirmItems"></div>
    <div class="confirm-total">Total: <span id="confirmTotal">$0</span></div>
    <div class="confirm-buttons">
      <button id="cancelConfirm">Cancelar</button>
      <button id="confirmSend">Confirmar y enviar</button>
    </div>
  </div>
</div>
<script>
var cart=[];
var WA_PHONE="${d.waPhone}";
var WA_PREFIX="${d.waPrefix.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n')}";
var SUCCESS_MSG="${d.waSuccess.replace(/"/g,'\\"')}";
var CURRENCY="${d.currency}";
document.addEventListener("DOMContentLoaded",function(){
  var tabs=document.querySelectorAll(".tab");
  var sections=document.querySelectorAll(".section");
  var topBar=document.querySelector(".top-bar");
  var modal=document.querySelector(".product-modal");
  var overlay=document.querySelector(".overlay");
  var modalImgWrap=document.getElementById("modalImgWrap");
  var modalName=document.getElementById("modalName");
  var modalDescription=document.getElementById("modalDescription");
  var quantityValue=document.getElementById("quantityValue");
  var cartBar=document.querySelector(".cart-bar");
  var cartImagesEl=document.querySelector(".cart-images");
  var cartCount=document.getElementById("cartCount");
  var cartTotal=document.getElementById("cartTotal");
  var sheetTotal=document.getElementById("sheetTotal");
  var cartSheet=document.getElementById("cartSheet");
  var cartSheetContent=document.getElementById("cartSheetContent");
  var confirmModal=document.getElementById("confirmModal");
  var confirmItemsEl=document.getElementById("confirmItems");
  var confirmTotal=document.getElementById("confirmTotal");
  var quantity=1;
  var currentActive="";
  var currentItem={};
  tabs.forEach(function(tab){
    tab.addEventListener("click",function(){
      var target=document.getElementById(tab.dataset.target);
      var offset=topBar.offsetHeight+20;
      window.scrollTo({top:target.getBoundingClientRect().top+window.pageYOffset-offset,behavior:"smooth"});
    });
  });
  window.addEventListener("scroll",function(){
    sections.forEach(function(section){
      var st=section.offsetTop-topBar.offsetHeight-60;
      if(window.scrollY>=st&&window.scrollY<st+section.offsetHeight) currentActive=section.id;
    });
    tabs.forEach(function(tab){
      tab.classList.remove("active");
      if(tab.dataset.target===currentActive){
        tab.classList.add("active");
        var tc=document.querySelector(".tabs");
        tc.scrollTo({left:tab.offsetLeft-(tc.offsetWidth/2)+(tab.offsetWidth/2),behavior:"smooth"});
      }
    });
  });
  document.querySelectorAll(".add-btn").forEach(function(btn){
    btn.addEventListener("click",function(e){
      var item=e.target.closest(".item");
      currentItem={name:item.dataset.name,description:item.dataset.description,price:item.dataset.price,imgsrc:item.dataset.imgsrc||""};
      if(currentItem.imgsrc){
        modalImgWrap.innerHTML='<img src="'+currentItem.imgsrc+'" alt="">';
      } else {
        modalImgWrap.innerHTML='<div class="modal-no-img">🍽️</div>';
      }
      modalName.textContent=currentItem.name;
      modalDescription.textContent=currentItem.description;
      quantity=1; quantityValue.textContent=1;
      modal.classList.add("active"); overlay.classList.add("active");
      cartBar.classList.remove("active");
    });
  });
  document.getElementById("plus").addEventListener("click",function(){quantity++;quantityValue.textContent=quantity;});
  document.getElementById("minus").addEventListener("click",function(){if(quantity>1){quantity--;quantityValue.textContent=quantity;}});
  overlay.addEventListener("click",closeModal);
  document.querySelector(".close-modal").addEventListener("click",closeModal);
  function closeModal(){modal.classList.remove("active");overlay.classList.remove("active");if(cart.length>0)cartBar.classList.add("active");}
  document.querySelector(".add-cart-btn").addEventListener("click",function(){
    var price=parseFloat(currentItem.price);
    var note=document.getElementById("modalNotes").value.trim();
    var existing=cart.find(function(i){return i.name===currentItem.name&&i.price===price&&i.note===note;});
    if(existing){existing.quantity+=quantity;}
    else{cart.push({name:currentItem.name,imgsrc:currentItem.imgsrc,price:price,quantity:quantity,note:note});}
    document.getElementById("modalNotes").value="";
    if(navigator.vibrate)navigator.vibrate(50);
    updateCartBar(); closeModal();
  });
  function updateCartBar(){
    if(cart.length===0){cartBar.classList.remove("active");return;}
    cartBar.classList.add("active");
    cartImagesEl.innerHTML="";
    var ti=0,tp=0;
    cart.forEach(function(i){ti+=i.quantity;tp+=i.price*i.quantity;});
    cart.slice(0,2).forEach(function(i){
      if(i.imgsrc){var img=document.createElement("img");img.src=i.imgsrc;cartImagesEl.appendChild(img);}
    });
    cartCount.textContent=ti+" producto"+(ti>1?"s":"");
    var ts="$"+tp+" "+CURRENCY;
    cartTotal.textContent=ts; sheetTotal.textContent=ts;
  }
  document.getElementById("goToCart").addEventListener("click",function(){renderCart();cartSheet.classList.add("active");});
  document.getElementById("closeCart").addEventListener("click",function(){cartSheet.classList.remove("active");});
  function renderCart(){
    cartSheetContent.innerHTML="";
    cart.forEach(function(product,index){
      var item=document.createElement("div");
      item.classList.add("cart-item");
      var thumbHTML=product.imgsrc?'<img src="'+product.imgsrc+'" />':'<div class="cart-thumb-placeholder">🍽️</div>';
      item.innerHTML='<div class="delete-zone">Eliminar</div><div class="cart-item-inner">'+thumbHTML+'<div><div>'+product.name+'</div><small>$'+product.price+' '+CURRENCY+'</small>'+(product.note?'<div class="cart-note">📝 '+product.note+'</div>':'')+'</div><div class="cart-controls">'+(product.quantity>1?'<button class="minus">-</button>':'<button class="trash">🗑</button>')+'<span>'+product.quantity+'</span><button class="plus">+</button></div></div>';
      item.querySelector(".plus").addEventListener("click",function(){cart[index].quantity++;renderCart();updateCartBar();});
      var m=item.querySelector(".minus");
      if(m)m.addEventListener("click",function(){cart[index].quantity--;renderCart();updateCartBar();});
      var t=item.querySelector(".trash");
      if(t)t.addEventListener("click",function(){item.classList.add("swiped");item.querySelector(".delete-zone").addEventListener("click",function(){cart.splice(index,1);renderCart();updateCartBar();});});
      var sx=0;
      item.querySelector(".cart-item-inner").addEventListener("touchstart",function(e){sx=e.touches[0].clientX;});
      item.querySelector(".cart-item-inner").addEventListener("touchend",function(e){if(item.classList.contains("swiped")&&e.changedTouches[0].clientX-sx>60)item.classList.remove("swiped");});
      cartSheetContent.appendChild(item);
    });
  }
  document.getElementById("sendWhatsApp").addEventListener("click",function(){
    if(cart.length===0)return;
    if(navigator.vibrate)navigator.vibrate(40);
    confirmItemsEl.innerHTML="";
    var total=0;
    cart.forEach(function(item){
      var sub=item.price*item.quantity; total+=sub;
      var div=document.createElement("div"); div.classList.add("confirm-item");
      var th=item.imgsrc?'<img src="'+item.imgsrc+'" />':'<div class="confirm-item-thumb">🍽️</div>';
      div.innerHTML=th+'<div><div>'+item.name+'</div><small>'+item.quantity+' x $'+item.price+'</small></div><div style="margin-left:auto;font-weight:bold">$'+sub+'</div>';
      confirmItemsEl.appendChild(div);
    });
    confirmTotal.textContent="$"+total+" "+CURRENCY;
    confirmModal.classList.add("active");
  });
  document.getElementById("cancelConfirm").addEventListener("click",function(){confirmModal.classList.remove("active");});
  document.getElementById("confirmSend").addEventListener("click",function(){
    if(navigator.vibrate)navigator.vibrate([80,40,80]);
    var msg=WA_PREFIX+"\\n\\n"; var total=0;
    cart.forEach(function(item){
      var sub=item.price*item.quantity; total+=sub;
      msg+="• "+item.name+" x"+item.quantity+" - $"+sub+" "+CURRENCY;
      if(item.note&&item.note.trim()!=="")msg+="\\n  📝 Nota: "+item.note;
      msg+="\\n";
    });
    msg+="\\nTotal: $"+total+" "+CURRENCY;
    window.open("https://wa.me/"+WA_PHONE+"?text="+encodeURIComponent(msg),"_blank");
    cart=[]; updateCartBar(); renderCart();
    confirmModal.classList.remove("active"); cartSheet.classList.remove("active");
    var toast=document.createElement("div"); toast.classList.add("success-toast"); toast.textContent=SUCCESS_MSG;
    document.body.appendChild(toast);
    setTimeout(function(){toast.classList.add("show");},50);
    setTimeout(function(){toast.classList.remove("show");setTimeout(function(){toast.remove();},300);},2500);
  });
});
<\/script>
</body>
</html>`;
}

let debounceTimer;
function updatePreview() {
  collectData();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    // Generate preview version (images already embedded as base64)
    const d = menuData;
    const tabsHTML = d.sections.map(s=>`<button class="tab" data-target="${s.id}">${escH(s.name)}</button>`).join('\n');
    const finalHTML = generateFinalHTML(d, tabsHTML, '');
    document.getElementById('previewFrame').srcdoc = finalHTML;
  }, 300);
}

function downloadHTML() {
  collectData();
  const d = menuData;
  const tabsHTML = d.sections.map(s=>`<button class="tab" data-target="${s.id}">${escH(s.name)}</button>`).join('\n');
  const html = generateFinalHTML(d, tabsHTML, '');
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (d.name.replace(/[^a-z0-9]/gi,'_').toLowerCase()||'menu')+'.html';
  a.click();
  URL.revokeObjectURL(url);
}

renderSectionsEditor();
updatePreview();
